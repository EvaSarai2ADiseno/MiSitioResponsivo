<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Responsivo Colorido</title>
    <style>
        /* Estilos base */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #584831; /* Café/Naranja */
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* Contenedor principal con Flexbox */
        .container {
            display: flex;
            flex: 1;
            flex-wrap: wrap;
        }

        /* Secciones con colores */
        .barramenu {
            background-color: #d8ee9f; /* Verde lima */
            flex: 1;
            min-width: 200px;
            padding: 20px;
        }

        .principal {
            background-color: #fd8ab8; /* Rosa intenso */
            color: white;
            flex: 3;
            min-width: 300px;
            padding: 20px;
            text-align: center;
        }

        .infoextra {
            background-color: #b1ffea; /* Verde menta */
            flex: 1;
            min-width: 200px;
            padding: 20px;
            text-align: center;
        }

        /* Estilo de la imagen corregido */
        .mismema {
            max-width: 100%;
            height: auto;
            margin: 20px auto;
            display: block;
            border-radius: 10px; /* Opcional: bordes redondeados */
        }

        footer {
            background-color: #3d3626;
            color: white;
            text-align: center;
            padding: 10px;
        }

        /* Media Query para móviles */
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Mi Sitio Web Responsivo</h1>
    </header>

    <div class="container">
        <div class="barramenu">
            <h3>Menú</h3>
            <p>Este es el lateral verde.</p>
        </div>
        
        <div class="principal">
            <h2>Contenido Principal</h2>
            <p>Yo soy el área rosa. En pantallas grandes soy ancho, en móviles me estiro.</p>
            
            <img src="img/mismema.png" alt="Un gato gracioso" class="mismema">
        </div>

        <div class="infoextra">
            <h3>Info Extra</h3>
            <p>Un toque de verde menta para variar.</p>
        </div>
    </div>

    <footer>
        <p>Mata Dzul Eva Saraí &copy; 2026</p>
    </footer>

</body>
</html>
